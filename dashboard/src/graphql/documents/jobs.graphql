query JobsList($cluster: String) {
  jobs(cluster: $cluster) {
    id
    name
    state
    startTime
    endTime
    duration
    lastModification
    tasks {
      created
      scheduled
      deploying
      running
      finished
      canceling
      canceled
      failed
      reconciling
      initializing
    }
  }
}

query JobDetail($id: ID!, $cluster: String) {
  job(id: $id, cluster: $cluster) {
    id
    name
    state
    startTime
    endTime
    duration
    now
    vertices {
      id
      name
      maxParallelism
      parallelism
      status
      startTime
      endTime
      duration
      tasks {
        created
        scheduled
        deploying
        running
        finished
        canceling
        canceled
        failed
        reconciling
        initializing
      }
      metrics {
        readBytes
        readBytesComplete
        writeBytes
        writeBytesComplete
        readRecords
        readRecordsComplete
        writeRecords
        writeRecordsComplete
        accumulatedBackpressured
        accumulatedIdle
        accumulatedBusy
      }
    }
    plan {
      jid
      name
      type
      nodes {
        id
        parallelism
        operator
        operatorStrategy
        description
        inputs {
          num
          id
          shipStrategy
          exchange
        }
      }
    }
    exceptions {
      exceptionName
      stacktrace
      timestamp
      taskName
      endpoint
      taskManagerId
    }
    checkpoints {
      counts {
        completed
        inProgress
        failed
        total
        restored
      }
      history {
        id
        status
        isSavepoint
        triggerTimestamp
        latestAckTimestamp
        stateSize
        endToEndDuration
        processedData
        persistedData
        numSubtasks
        numAcknowledgedSubtasks
        checkpointedSize
      }
      summary {
        stateSize { min max avg }
        endToEndDuration { min max avg }
        checkpointedSize { min max avg }
      }
      latest {
        completed {
          id
          status
          triggerTimestamp
          stateSize
          endToEndDuration
        }
        restored {
          id
          restoreTimestamp
          isSavepoint
          externalPath
        }
      }
    }
    checkpointConfig {
      mode
      interval
      timeout
      minPause
      maxConcurrent
      externalizedEnabled
      externalizedDeleteOnCancellation
      unalignedCheckpoints
    }
    vertexDetails {
      id
      name
      parallelism
      now
      subtasks {
        subtask
        status
        attempt
        endpoint
        startTime
        endTime
        duration
        metrics {
          readBytes
          readBytesComplete
          writeBytes
          writeBytesComplete
          readRecords
          readRecordsComplete
          writeRecords
          writeRecordsComplete
          accumulatedBackpressured
          accumulatedIdle
          accumulatedBusy
        }
        taskManagerId
      }
    }
    watermarks {
      vertexId
      watermarks { id value }
    }
    backPressure {
      vertexId
      backPressure {
        status
        backpressureLevel
        endTimestamp
        subtasks {
          subtask
          attemptNumber
          backpressureLevel
          ratio
          busyRatio
          idleRatio
        }
      }
    }
    accumulators {
      vertexId
      accumulators { name type value }
    }
  }
}

mutation CancelJob($id: ID!, $cluster: String) {
  cancelJob(id: $id, cluster: $cluster) {
    success
  }
}
