query JobManagerDetail($cluster: String) {
  jobManager(cluster: $cluster) {
    config {
      key
      value
    }
    environment {
      jvm {
        version
        arch
        options
      }
      classpath
    }
    metrics {
      id
      value
    }
    haStatus {
      enabled
      mode
      storageDir
      clusterId
    }
  }
}

query JobManagerStdout($cluster: String) {
  jobManagerStdout(cluster: $cluster)
}

query JobManagerStderr($cluster: String) {
  jobManagerStderr(cluster: $cluster)
}
