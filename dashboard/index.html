<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlinkReactor Dashboard</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="description" content="Real-time monitoring dashboard for FlinkReactor pipelines" />
    <link rel="preload" href="/fonts/GeistVF.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/GeistMonoVF.woff2" as="font" type="font/woff2" crossorigin />
    <script>
      // Apply saved theme/palette before first paint to prevent flash
      ;(() => {
        try {
          var t = localStorage.getItem("fr-theme")
          if (t === "light" || t === "dark") {
            document.documentElement.classList.remove("dark", "light")
            document.documentElement.classList.add(t)
          }
          var p = localStorage.getItem("fr-palette")
          if (p === "tokyo-night") {
            document.documentElement.dataset.palette = p
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body class="bg-fr-bg font-sans text-fg antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
