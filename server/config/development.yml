app:
  debug: true

server:
  host: "0.0.0.0"
  port: 8080

flink:
  rest_url: "http://localhost:8081"
  sql_gateway_url: "http://localhost:8083"

health:
  interval: "30s"

log:
  level: "info"
  format: "console"

storage:
  enabled: true
  dsn: "postgres://reactor:reactor@localhost:5433/reactor"

instruments:
  - name: "pagila"
    type: "database"
    config:
      driver: "postgres"
      dsn: "postgres://reactor:reactor@localhost:5433/pagila"
  - name: "chinook"
    type: "database"
    config:
      driver: "postgres"
      dsn: "postgres://reactor:reactor@localhost:5433/chinook"
  - name: "employees"
    type: "database"
    config:
      driver: "postgres"
      dsn: "postgres://reactor:reactor@localhost:5433/employees"
