app:
  debug: false

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "60s"
  write_timeout: "60s"
  drain_timeout: "30s"

flink:
  rest_url: "http://flink-rest:8081"
  sql_gateway_url: "http://flink-sql-gateway:8083"
  # auth_token: set via FLINK_AUTH_TOKEN env var

health:
  interval: "30s"

log:
  level: "warn"
  format: "json"
