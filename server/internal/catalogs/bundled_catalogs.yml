              - { name: readingTime, type: "TIMESTAMP(3)" }
          - name: device_registry
            columns:
              - { name: deviceId, type: STRING }
              - { name: location, type: STRING }
              - { name: firmwareVersion, type: STRING }
              - { name: installDate, type: STRING }
              - { name: thresholdTemp, type: DOUBLE }
              - { name: thresholdVibration, type: DOUBLE }
              - { name: updateTime, type: "TIMESTAMP(3)" }

  - name: rides
    connector:
      type: kafka
